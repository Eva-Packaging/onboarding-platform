global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['api-gateway:8080']
        labels:
          service: api-gateway

  - job_name: user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['users:8080']
        labels:
          service: user-service

  - job_name: onboarding-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['onboarding:8080']
        labels:
          service: onboarding-service

  - job_name: provisioning-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['provisioning:8080']
        labels:
          service: provisioning-service
