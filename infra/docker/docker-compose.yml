name: onboarding
services:
  kafka:
    image: confluentinc/cp-kafka:8.2.0
    hostname: kafka-1
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: "WnLkTHhkQaiJbwP8FClPhw"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9091
      KAFKA_LISTENERS: "PLAINTEXT://:9090,CONTROLLER://:9091,EXTERNAL://:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-1:9090,EXTERNAL://${HOSTNAME:-localhost}:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_DIRS: /var/lib/kafka/data

      # single broker properties
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
    volumes:
      - kafka-1-data:/var/lib/kafka/data
      - ./kafka/server.properties:/opt/kafka/config/server.properties
    networks:
      - kafka-net
    restart: unless-stopped

  schema-registry:
    image: confluentinc/cp-schema-registry:8.2.0
    hostname: schema-registry
    ports:
      - "9090:8081"
    networks:
      - kafka-net
    depends_on:
      - kafka
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: "http://0.0.0.0:8081"
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "kafka-1:9090"
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL: "backward"
    restart: unless-stopped

  # control-center:
  #   image: confluentinc/cp-enterprise-control-center-next-gen:2.5.0
  #   hostname: control-center
  #   container_name: control-center
  #   depends_on:
  #     - kafka-1
  #     - schema-registry
  #   ports:
  #     - "9021:9021"
  #   networks:
  #     - kafka-net
  #   environment:
  #     CONTROL_CENTER_BOOTSTRAP_SERVERS: "PLAINTEXT://kafka-1:9090"
  #     CONTROL_CENTER_SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
  #     CONTROL_CENTER_REPLICATION_FACTOR: 1
  #     CONTROL_CENTER_INTERNAL_TOPICS_REPLICATION: 1

  consul:
    image: hashicorp/consul:1.21
    hostname: consul
    ports:
      - "8500:8500"
    command: "agent -dev -client=0.0.0.0 -bind=0.0.0.0"
    networks:
      - microservice
    restart: unless-stopped

#  api-gateway:
#    image: api-gateway:dev
#    build:
#      context: ../../backend/api-gateway
#      dockerfile: Dockerfile
#    ports:
#      - "8080:8080"
#    environment:
#      SPRING_PROFILES_ACTIVE: docker
#    depends_on:
#      - consul
#    networks:
#      - microservice
#    restart: unless-stopped

  postgres:
    image: postgres:17-alpine3.19
    environment:
      POSTGRES_USER: ${DATABASE_USER:-default}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-password}
      POSTGRES_DB: ${DATABASE_NAME:-onboarding}
      PGDATA: /data/postgres
    volumes:
      - postgres:/data/postgres
      - ./postgres:/docker-entrypoint-initdb.d
    ports:
      - '${DATABASE_PORT:-5432}:5432'
    networks:
      - postgres
    restart: unless-stopped

#  pgadmin:
#    image: dpage/pgadmin4
#    environment:
#      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgadmin4@pgadmin.org}
#      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
#      PGADMIN_CONFIG_SERVER_MODE: 'False'
#    volumes:
#      - pgadmin:/var/lib/pgadmin
#    ports:
#      - '5050:80'
#    networks:
#      - postgres
#    restart: unless-stopped

  zipkin:
    image: openzipkin/zipkin:3
    hostname: zipkin
    ports:
      - "9411:9411"
    networks:
      - observability
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.4.0
    hostname: prometheus
    ports:
      - "9093:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - observability
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.0.1
    hostname: grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - observability
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  microservice:
    driver: bridge
  kafka-net:
    driver: bridge
  postgres:
    driver: bridge
  observability:
    driver: bridge

volumes:
  kafka-1-data:
  postgres:
  prometheus-data:
  grafana-data: