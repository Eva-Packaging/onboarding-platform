spring:
  datasource:
    url: jdbc:postgresql://${DATABASE_HOST:postgres}:${DATABASE_PORT:5432}/${DATABASE_NAME:onboarding_service}
  kafka:
    bootstrap-servers: ${BOOTSTRAP_SERVERS:kafka-1:9092}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
        show_sql: false
server:
  port: 8080
logging:
  level:
    root: info
    xyz:
      catuns:
        onboarding:
          service: debug
