spring:
  cloud:
    consul:
      host: ${CONSUL_HOST:consul}
      port: ${CONSUL_PORT:8500}
  datasource:
    url: jdbc:postgresql://${DATABASE_HOST:postgres}:${DATABASE_PORT:5432}/${DATABASE_NAME:onboarding_service}
  kafka:
    bootstrap-servers: ${BOOTSTRAP_SERVERS:kafka-1:9090}
    properties:
      schema-registry-url: ${SCHEMA_REGISTRY_URL:http://schema-registry:8081}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
        show_sql: false
server:
  port: 8080
logging:
  level:
    root: info
    xyz:
      catuns:
        onboarding:
          service: debug
management:
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}