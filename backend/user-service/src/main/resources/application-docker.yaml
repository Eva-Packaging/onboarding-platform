spring:
  cloud:
    consul:
      host: ${CONSUL_HOST:consul}
      port: ${CONSUL_PORT:8500}
  datasource:
    url: jdbc:postgresql://${DATABASE_HOST:postgres}:${DATABASE_PORT:5432}/${DATABASE_NAME:user_service}
  kafka:
    bootstrap-servers: ${BOOTSTRAP_SERVERS:kafka:9092}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
        show_sql: false
  flyway:
    enabled: true
server:
  port: 8080
logging:
  level:
    root: warn
    xyz:
      catuns:
        onboarding:
          user: info
