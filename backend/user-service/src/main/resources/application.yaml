app:
  kafka:
    partitions: 1
    replicas: 1
    topics:
      user-registered: edu.user.registered.v1
  open-api:
    description: @project.description@
    title: @project.name@
    version: @project.version@
  feign:
    clients:
      onboarding: onboarding-service
      github-url: https://api.github.com
  outbox:
    poll-interval-ms: 60000 # 1 minute should be good
spring:
  application:
    name: user-service
  cloud:
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      discovery:
        enabled: true
        prefer-ip-address: true
        instance-id: ${spring.application.name}:${server.port:8080}
  datasource:
    password: ${DATABASE_PASSWORD:password}
    url: jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:user_service}
    username: ${DATABASE_USER:default}
  kafka:
    producer:
      retries: 10
      acks: all
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        delivery.timeout: 60000
        request.timeout.ms: 30000
        linger.ms: 0
        max.inflight.requests.per.connection: 5
        enable:
          idempotence: true
    bootstrap-servers: ${BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      group-id: user-service-group
      properties:
        spring.json.trusted.packages: xyz.catuns.onboarding.user.*
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    properties:
      schema-registry-url: ${SCHEMA_REGISTRY_URL:}
    template:
      observation-enabled: true
    listener:
      observation-enabled: true
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        show_sql: false
  flyway:
    enabled: true
management:
  endpoint:
    health:
      probes:
        enabled: true
    prometheus:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,prometheus
  health:
    liveness-state:
      enabled: true
    readiness-state:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
jwt:
  secret: ${JWT_SECRET}
  issuer: ${spring.application.name}
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        permitted-number-of-calls-in-half-open-state: 3
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
