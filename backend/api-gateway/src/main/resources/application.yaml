app:
  open-api:
    description: @project.description@
    title: @project.name@
    version: @project.version@
spring:
  cloud:
    consul:
      port: 8500
      discovery:
        instance-id: ${spring.application.name}:${random.value}
        prefer-ip-address: true
      host: localhost
    gateway:
      server:
        webflux:
          discovery:
            locator:
              lower-case-service-id: true
              enabled: true
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/v1/users/**
              filters:
                - RewritePath=/api/v1/users/(?<segment>.*), /api/v1/$\{segment}
            - id: onboarding-service
              uri: lb://onboarding-service
              predicates:
                - Path=/api/v1/onboarding/**
            - id: admin-to-onboarding
              uri: lb://onboarding-service
              predicates:
                - Path=/api/v1/admin/**
            - id: provisioning-service
              uri: lb://provisioning-service
              predicates:
                - Path=/api/v1/provisioning/**
              filters:
                - RewritePath=/api/v1/provisioning/(?<segment>.*), /api/v1/$\{segment}
  application:
    name: api-gateway
  profiles:
    active: dev
management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health
  health:
    liveness-state:
      enabled: true
    readiness-state:
      enabled: true
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        permitted-number-of-calls-in-half-open-state: 3
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
